<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
        }

        /* Sidebar - Contact List */
        .sidebar {
            width: 350px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #f0f2f5;
            border-bottom: 1px solid #e0e0e0;
        }

        .sidebar-header h2 {
            font-size: 20px;
            color: #075e54;
        }

        .search-box {
            padding: 10px;
            background: white;
            border-bottom: 1px solid #e0e0e0;
        }

        .search-box input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
        }

        .chats-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #f5f5f5;
        }

        .chat-item.active {
            background: #e8f0fe;
            border-left: 3px solid #25d366;
        }

        .chat-name {
            font-weight: 600;
            color: #111;
            margin-bottom: 5px;
        }

        .chat-preview {
            font-size: 13px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-time {
            font-size: 11px;
            color: #999;
            float: right;
        }

        /* Main Chat Area */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #e5ddd5;
        }

        .chat-header {
            background: white;
            padding: 15px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h3 {
            font-size: 18px;
            color: #075e54;
        }

        .chat-header .status {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }

        .debug-info {
            font-size: 11px;
            color: #999;
            background: #f5f5f5;
            padding: 5px 10px;
            border-radius: 5px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-image: url('https://web.whatsapp.com/img/bg-chat-tile-dark_a4be512e7195b6b733d9110b408f075d.png');
            background-repeat: repeat;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.sent {
            justify-content: flex-end;
        }

        .message.received {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 60%;
            padding: 8px 12px;
            border-radius: 8px;
            position: relative;
        }

        .message.sent .message-content {
            background: #dcf8c6;
            color: #111;
        }

        .message.received .message-content {
            background: white;
            color: #111;
        }

        .message-text {
            font-size: 14px;
            word-wrap: break-word;
        }

        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
            text-align: right;
        }

        .media-message {
            color: #075e54;
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            color: #666;
            margin-top: 50px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .message-input-area {
            background: white;
            padding: 15px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .message-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        .send-button {
            background: #25d366;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
        }

        .send-button:hover {
            background: #128c7e;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 10px;
        }

        .status-connected {
            background: #25d366;
            color: white;
        }

        .status-disconnected {
            background: #ff4444;
            color: white;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>ZAPPER</h2>
                <div id="connectionStatus" class="status-badge status-disconnected">Disconnected</div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search chats..." onkeyup="filterChats()">
            </div>
            <div class="chats-list" id="chatsList">
                <div class="loading">Loading chats...</div>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-area">
            <div class="chat-header" id="chatHeader" style="display: none;">
                <div>
                    <h3 id="chatName">Select a chat</h3>
                    <div class="status" id="chatStatus"></div>
                </div>
                <div class="debug-info" id="debugInfo"></div>
            </div>
            <div class="messages-container" id="messagesContainer">
                <div class="empty-state">
                    <p>Select a chat to view messages</p>
                </div>
            </div>
            <div class="message-input-area" id="messageInputArea" style="display: none;">
                <input type="text" class="message-input" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
                <button class="send-button" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let socket = io();
        let currentChatId = null;
        let currentChatName = null;
        let allChats = [];

        // Socket event handlers
        socket.on('connect', () => {
            console.log('✅ Connected to server');
            addDebugLog('Connected to server');
        });

        socket.on('qr', (data) => {
            console.log('📱 QR Code received');
            addDebugLog('QR Code received - scan with WhatsApp');
        });

        socket.on('ready', (data) => {
            console.log('✅ WhatsApp ready:', data);
            addDebugLog('WhatsApp is ready!');
            updateConnectionStatus(true);
            loadChats();
        });

        socket.on('client_ready', (data) => {
            console.log('✅ Client ready:', data);
            addDebugLog('Client is ready!');
            updateConnectionStatus(true);
            loadChats();
        });

        socket.on('disconnected', (data) => {
            console.log('❌ Disconnected:', data);
            addDebugLog('Disconnected: ' + data.reason);
            updateConnectionStatus(false);
        });

        socket.on('message', (message) => {
            console.log('📨 New message:', message);
            addDebugLog('New message from: ' + message.from);
            
            // If this message is for the current chat, add it to the view
            if (currentChatId && (message.from === currentChatId || message.to === currentChatId)) {
                addMessageToChat(message);
            }
        });

        socket.on('error', (error) => {
            console.error('Socket error:', error);
            addDebugLog('Error: ' + error.message);
            showError(error.message);
        });

        // Load chats from server
        async function loadChats() {
            try {
                addDebugLog('Loading chats...');
                const response = await fetch('/api/chats');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const chats = await response.json();
                console.log('Loaded chats:', chats);
                addDebugLog(`Loaded ${chats.length} chats`);
                
                if (!chats || chats.length === 0) {
                    document.getElementById('chatsList').innerHTML = '<div class="loading">No chats found. Make sure WhatsApp is connected and you have conversations.</div>';
                    addDebugLog('No chats found!');
                    return;
                }
                
                allChats = chats;
                displayChats(chats);
            } catch (error) {
                console.error('Error loading chats:', error);
                addDebugLog('Error loading chats: ' + error.message);
                document.getElementById('chatsList').innerHTML = `<div class="loading">Error loading chats: ${error.message}</div>`;
                showError('Failed to load chats: ' + error.message);
            }
        }

        // Display chats in sidebar
        function displayChats(chats) {
            const chatsList = document.getElementById('chatsList');
            if (!chats || chats.length === 0) {
                chatsList.innerHTML = '<div class="loading">No chats found</div>';
                return;
            }

            chatsList.innerHTML = chats.map(chat => `
                <div class="chat-item" onclick="selectChat('${escapeHtml(chat.id)}', '${escapeHtml(chat.name)}')">
                    <div class="chat-name">${escapeHtml(chat.name || chat.id)}</div>
                    <div class="chat-preview">${chat.unreadCount > 0 ? `📩 ${chat.unreadCount} unread` : 'Click to view messages'}</div>
                </div>
            `).join('');
            
            addDebugLog(`Displayed ${chats.length} chats in sidebar`);
        }

        // Filter chats based on search input
        function filterChats() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allChats.filter(chat => 
                (chat.name || chat.id).toLowerCase().includes(searchTerm)
            );
            displayChats(filtered);
        }

        // Select a chat and load its history
        async function selectChat(chatId, chatName) {
            console.log(`Selecting chat: ${chatName} (${chatId})`);
            addDebugLog(`Loading chat: ${chatName}`);
            
            currentChatId = chatId;
            currentChatName = chatName;
            
            // Update UI
            document.getElementById('chatHeader').style.display = 'flex';
            document.getElementById('chatName').innerText = chatName;
            document.getElementById('messageInputArea').style.display = 'flex';
            document.getElementById('messagesContainer').innerHTML = '<div class="loading">Loading messages...</div>';
            document.getElementById('debugInfo').innerText = `Chat ID: ${chatId}`;
            
            // Highlight active chat in sidebar
            document.querySelectorAll('.chat-item').forEach(item => {
                item.classList.remove('active');
            });
            if (event && event.currentTarget) {
                event.currentTarget.classList.add('active');
            }
            
            // Load chat history
            await loadChatHistory(chatId);
        }
        
        // Load chat history from API
        async function loadChatHistory(chatId) {
            try {
                addDebugLog(`Fetching history for: ${chatId}`);
                const response = await fetch(`/api/history/${encodeURIComponent(chatId)}?limit=50`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Chat history:', data);
                addDebugLog(`Loaded ${data.count || 0} messages`);
                
                if (data.messages && data.messages.length > 0) {
                    displayMessages(data.messages.reverse());
                } else {
                    document.getElementById('messagesContainer').innerHTML = '<div class="empty-state">No messages yet. Start a conversation!</div>';
                    addDebugLog('No messages found in this chat');
                }
            } catch (error) {
                console.error('Error loading chat history:', error);
                addDebugLog(`Error loading history: ${error.message}`);
                document.getElementById('messagesContainer').innerHTML = `<div class="empty-state">Error loading messages: ${error.message}</div>`;
                showError('Failed to load chat history: ' + error.message);
            }
        }
        
        // Display messages in chat area
        function displayMessages(messages) {
            const container = document.getElementById('messagesContainer');
            container.innerHTML = '';
            
            // Display messages in chronological order (oldest first)
            messages.reverse().forEach(message => {
                const messageElement = createMessageElement(message);
                container.appendChild(messageElement);
            });
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
            addDebugLog(`Displayed ${messages.length} messages`);
        }
        
        // Create message element
        function createMessageElement(message) {
            const messageDiv = document.createElement('div');
            const isFromMe = message.fromMe;
            messageDiv.className = `message ${isFromMe ? 'sent' : 'received'}`;
            
            const time = new Date(message.timestamp * 1000).toLocaleTimeString();
            
            let contentHtml = '';
            if (message.type === 'chat') {
                contentHtml = `<div class="message-text">${escapeHtml(message.body)}</div>`;
            } else if (message.hasMedia) {
                contentHtml = `<div class="message-text media-message">📎 ${message.type.toUpperCase()} attachment</div>`;
                if (message.body) {
                    contentHtml += `<div class="message-text">${escapeHtml(message.body)}</div>`;
                }
            } else {
                contentHtml = `<div class="message-text">[${message.type}] ${escapeHtml(message.body)}</div>`;
            }
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${contentHtml}
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            return messageDiv;
        }
        
        // Add a single message to the chat (for real-time updates)
        function addMessageToChat(message) {
            const container = document.getElementById('messagesContainer');
            if (container.innerHTML.includes('No messages') || container.innerHTML.includes('Error loading')) {
                container.innerHTML = '';
            }
            
            const messageElement = createMessageElement(message);
            container.appendChild(messageElement);
            container.scrollTop = container.scrollHeight;
            addDebugLog('Added new message to chat');
        }
        
        // Send a message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) {
                addDebugLog('Cannot send empty message');
                return;
            }
            
            if (!currentChatId) {
                addDebugLog('No chat selected');
                alert('Please select a chat first');
                return;
            }
            
            addDebugLog(`Sending message to ${currentChatName}: ${message}`);
            
            try {
                const response = await fetch('/api/send-message', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        to: currentChatId,
                        message: message
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Add sent message to chat
                    const sentMessage = {
                        id: Date.now().toString(),
                        from: 'me',
                        to: currentChatId,
                        body: message,
                        timestamp: Math.floor(Date.now() / 1000),
                        type: 'chat',
                        fromMe: true,
                        hasMedia: false,
                        isForwarded: false
                    };
                    addMessageToChat(sentMessage);
                    input.value = '';
                    addDebugLog('Message sent successfully');
                } else {
                    addDebugLog('Failed to send message: ' + (result.error || 'Unknown error'));
                    alert('Failed to send message: ' + (result.error || 'Unknown error'));
                }
            } catch (error) {
                console.error('Error sending message:', error);
                addDebugLog('Error sending message: ' + error.message);
                alert('Error sending message: ' + error.message);
            }
        }
        
        // Handle Enter key press
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // Update connection status
        function updateConnectionStatus(connected) {
            const statusBadge = document.getElementById('connectionStatus');
            if (connected) {
                statusBadge.textContent = 'Connected';
                statusBadge.className = 'status-badge status-connected';
            } else {
                statusBadge.textContent = 'Disconnected';
                statusBadge.className = 'status-badge status-disconnected';
            }
        }
        
        // Add debug log
        function addDebugLog(message) {
            console.log(`[DEBUG] ${message}`);
            const debugInfo = document.getElementById('debugInfo');
            if (debugInfo && currentChatId) {
                const timestamp = new Date().toLocaleTimeString();
                debugInfo.innerHTML = `${debugInfo.innerHTML.split('<br>')[0]}<br><small>${timestamp}: ${message}</small>`;
                // Keep only last 3 lines
                const lines = debugInfo.innerHTML.split('<br>');
                if (lines.length > 4) {
                    debugInfo.innerHTML = lines.slice(0, 2).join('<br>') + '<br>' + lines.slice(-2).join('<br>');
                }
            }
        }
        
        // Show error message
        function showError(message) {
            const container = document.getElementById('messagesContainer');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `⚠️ ${escapeHtml(message)}`;
            container.insertBefore(errorDiv, container.firstChild);
            setTimeout(() => errorDiv.remove(), 5000);
        }
        
        // Helper function to escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Initial load
        console.log('Frontend loaded, waiting for WhatsApp connection...');
        addDebugLog('Frontend loaded, waiting for connection...');
        
        // Check connection status periodically
        setInterval(async () => {
            try {
                const response = await fetch('/api/status');
                const status = await response.json();
                if (status.ready && allChats.length === 0) {
                    addDebugLog('Client is ready, loading chats...');
                    loadChats();
                }
            } catch (error) {
                // Ignore errors
            }
        }, 5000);
    </script>
</body>
</html>
